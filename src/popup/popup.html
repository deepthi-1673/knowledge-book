<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="popup.css" />
    <title>Knowledge Book</title>
  </head>
  <body>
    <header class="pk-head">
      <span class="pk-logo">Kb</span>
      <div>
        <h1>Knowledge Book</h1>
        <p id="pk-status" class="pk-status">Loading…</p>
      </div>
    </header>

    <div class="pk-actions">
      <button id="pk-open" class="pk-btn pk-primary">Open my journal &#9998;</button>
      <button id="pk-options" class="pk-btn">Settings</button>
    </div>

    <div class="pk-recent">
      <div class="pk-recent-head">
        <h2>Fresh clippings</h2>
        <button id="pk-seeall" class="pk-seeall">see all &rarr;</button>
      </div>
      <div id="pk-list" class="pk-list">
        <p class="pk-empty">Nothing saved yet. Highlight text on any page and click Save to journal.</p>
      </div>
    </div>

    <p class="pk-hint">highlight anything, then &ldquo;save to journal&rdquo;</p>

    <script src="popup.js"></script>
  </body>
</html>
